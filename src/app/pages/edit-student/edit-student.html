<h2>Edit Student</h2>

<form (ngSubmit)="updateStudent()">

  <p>Student Name</p>

  <input
    type="text"
    name="name"
    [(ngModel)]="student.name"
    required>

  <p>Age</p>

  <input
    type="number"
    name="age"
    [(ngModel)]="student.age"
    required>

  <p>Course</p>

  <input
    type="text"
    name="course"
    [(ngModel)]="student.course"
    required>

  <br><br>

  <button type="submit">
    Update Student
  </button>

</form>
