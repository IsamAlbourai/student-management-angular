<h2>Edit Student</h2>

<form (ngSubmit)="updateStudent()">

  <p>Student Name</p>

  <input
    type="text"
    name="name"
    [ngModel]="student().name"
    (ngModelChange)="student.update(s => ({ ...s, name: $event }))"
    required>

  <p>Age</p>

  <input
    type="number"
    name="age"
    [ngModel]="student().age"
    (ngModelChange)="student.update(s => ({ ...s, age: +$event }))"
    required>

  <p>Course</p>

  <input
    type="text"
    name="course"
    [ngModel]="student().course"
    (ngModelChange)="student.update(s => ({ ...s, course: $event }))"
    required>

  <br><br>

  <button type="submit">
    Update Student
  </button>

</form>
