<h2>Students</h2>

<p>Total students: {{ students().length }}</p>

<p>Search</p>

<input
  type="text"
  [(ngModel)]="searchText"
  placeholder="Search by name or course">

<br><br>

<table border="1" cellpadding="10">

  <thead>
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Age</th>
    <th>Course</th>
    <th>Action</th>
  </tr>
  </thead>

  <tbody>
  <tr *ngFor="let student of getFilteredStudents()">
    <td>{{ student.id }}</td>
    <td>{{ student.name }}</td>
    <td>{{ student.age }}</td>
    <td>{{ student.course }}</td>
    <td>
      <button (click)="deleteStudent(student.id)">
        Delete
      </button>
    </td>
  </tr>
  </tbody>

</table>
